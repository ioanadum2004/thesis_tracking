test create conda env:
  <<: *run_test_cpu
  needs: []
  script:
    - cd ..
    - pwd
    - docker run -dit --rm --shm-size=8g -v $(pwd):/acorn --name conda_container registry.cern.ch/docker.io/continuumio/miniconda3:latest /bin/bash
    # remember to request 8GB of shared memory here with --shms-size=8g !!! Otherwise memory intensive tests will fail
    - docker exec -w /acorn conda_container sh create_conda_environment.sh
    - docker exec -w /acorn/tests conda_container sh run_test.sh
    - docker stop conda_container 
  rules:
    - when: always