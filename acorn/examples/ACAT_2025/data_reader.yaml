# CommonFramework configuration
stage: data_reading
model: AthenaRootReader
input_dir: MY_DATA_DIR/dump_root/
input_sets:
    train: MY_DATA_DIR/train_set_ttbar_uncorr.txt
    valid: MY_DATA_DIR/valid_set_ttbar_uncorr.txt
    test: MY_DATA_DIR/test_set_ttbar_uncorr.txt

stage_dir: MY_DATA_DIR/feature_store/

max_workers: 16

variable_with_prefix: true # Set to true to use the new naming scheme (with prefix to indicate the variable type)
skip_csv_conversion: true # Skip the csv conversion if the feature store csv files already exist. Useful for rerunning the data reading stage to produce pyg objects where variables names are added with prefix

# Feature Configurations
feature_sets:
    hit_features: [hit_id, hit_x, hit_y, hit_z, hit_r, hit_phi, hit_eta, hit_region, hit_module_id,
                hit_cluster_x_1, hit_cluster_y_1, hit_cluster_z_1, hit_cluster_x_2, hit_cluster_y_2, hit_cluster_z_2, 
                hit_cluster_r_1, hit_cluster_phi_1, hit_cluster_eta_1, hit_cluster_r_2, hit_cluster_phi_2, hit_cluster_eta_2,
                hit_norm_x_1, hit_norm_y_1, hit_norm_x_2, hit_norm_y_2, 
                hit_norm_z_1, hit_eta_angle_1, hit_phi_angle_1, hit_eta_angle_2, hit_phi_angle_2, hit_norm_z_2,
                hit_count_1, hit_charge_count_1, hit_loc_eta_1, hit_loc_phi_1, hit_localDir0_1, hit_localDir1_1, hit_localDir2_1,
                hit_lengthDir0_1, hit_lengthDir1_1, hit_lengthDir2_1, hit_glob_eta_1, hit_glob_phi_1,
                hit_count_2, hit_charge_count_2, hit_loc_eta_2, hit_loc_phi_2, hit_localDir0_2, hit_localDir1_2, hit_localDir2_2,
                hit_lengthDir0_2, hit_lengthDir1_2, hit_lengthDir2_2, hit_glob_eta_2, hit_glob_phi_2, ]

    track_features: [track_particle_id, track_particle_pt, track_particle_radius, track_particle_primary, track_particle_nhits, track_particle_pdgId, track_particle_eta, track_redundant_split_edges]

region_labels:
    1: {hardware: PIXEL, barrel_endcap: -2}
    2: {hardware: STRIP, barrel_endcap: -2}
    3: {hardware: PIXEL, barrel_endcap: 0}
    4: {hardware: STRIP, barrel_endcap: 0}
    5: {hardware: PIXEL, barrel_endcap: 2}
    6: {hardware: STRIP, barrel_endcap: 2}

fix_index_mismatch: True

log_level: INFO
