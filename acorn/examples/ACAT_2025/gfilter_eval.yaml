stage: edge_classifier
model: GNNFilter
input_dir: MY_DATA_DIR/metric_learning
stage_dir: MY_DATA_DIR/gfilter
project: ACAT2025_gfilter # Used in logging
accelerator: cuda
devices: 1
nodes: 1

data_split: [7785, 1000, 926]

variable_with_prefix: true

# Evaluation parameters
score_cut: 0.05
# undirected: false
target_tracks: 
  track_particle_pt: [1000., .inf]
  track_particle_nhits: [3., .inf]
  track_particle_primary: True
  track_particle_pdgId: [not_in, [11, -11]]

# Plotting parameters
plots:
