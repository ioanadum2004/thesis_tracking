  #   title: Filter efficiency
  # gnn_purity_rz: 
  #   title: Filter purity
  #   vmin: 0.
  #   vmax: 0.03
  graph_scoring_efficiency:
    title: Filter efficiency
    pt_units: MeV
    ylim: [0.97, 1.01]
