stage: edge_classifier
model: InteractionGNN2
input_dir: MY_DATA_DIR/gfilter
stage_dir: MY_DATA_DIR/ignn2
project: ACAT2025_ignn2 # Used in logging
accelerator: cuda
devices: 1
nodes: 1

# Dataset parameters
data_split: [7785, 1000, 926] # Number of [training, validation, testing] examples
dataset_class: GraphDataset
undirected: true

variable_with_prefix: true
add_variable_name_prefix: false

# Truth and weighting parameters. Syntax is...
# Single value: track[key] == value
# List of 2 floats: value1 <= track[key] <= value2
# List with a string as the first value: First value defines the boolean test, the second value is a list or value. Boolean tests are: (in, not_in, is, is_not, within, not_within)
# All other tracks follow the default: If a true edge, weight=0. If a fake edge, weight=1.
weighting:
  - weight: 0.5
    conditions: 
      edge_y: False
  - weight: 0.
    conditions:
      edge_y: True
  - weight: 1.
    conditions:
      edge_y: True
      track_particle_pt: [1000, .inf]
      track_particle_nhits: [3, .inf]
      track_particle_primary: True
      track_particle_pdgId: [not_in, [11, -11]]
      track_particle_radius: [0., 260.]
      track_particle_eta: [-4., 4.]
      track_redundant_split_edges: False

# Model parameters
input_cut: 0.05
edge_cut: 0.5
node_features: [hit_r, hit_phi, hit_z, hit_eta, hit_cluster_r_1, hit_cluster_phi_1, hit_cluster_z_1, hit_cluster_eta_1, hit_cluster_r_2, hit_cluster_phi_2, hit_cluster_z_2, hit_cluster_eta_2]
node_scales: [1000., 3.14159265359, 1000., 1., 1000., 3.14159265359, 1000., 1., 1000., 3.14159265359, 1000., 1.]
edge_features: [edge_dr, edge_dphi, edge_dz, edge_deta, edge_phislope, edge_rphislope]
#edge_features: None
hidden: 128
n_graph_iters: 8
n_node_encoder_layers: 3
n_edge_encoder_layers: 3
n_node_net_layers: 3
n_edge_net_layers: 3
n_node_decoder_layers: 3
n_edge_decoder_layers: 3
layernorm: True
output_layer_norm: False
edge_output_transform_final_layer_norm: False
batchnorm: False
output_batch_norm: False
edge_output_transform_final_batch_norm: False
bn_track_running_stats: False
hidden_activation: ReLU
output_activation: ReLU
edge_output_transform_final_activation: null
concat: True
node_net_recurrent: False
edge_net_recurrent: False
in_out_diff_agg: True
checkpointing: True
aggr: add

# Training parameters
warmup: 5
lr: 0.0005
min_lr: 0.000005
factor: 0.9
patience: 15
max_epochs: 200
debug: false
num_workers: [8,8,8]
max_training_graph_size: 2800000