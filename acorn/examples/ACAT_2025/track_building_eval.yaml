# CommonFramework configuration
stage: track_building
model: CCandWalk
input_dir: MY_DATA_DIR/ignn2
stage_dir: MY_DATA_DIR/track

# Dataset parameters
data_split: [0, 1000, 926]

target_tracks:
  track_particle_pt: [1000, .inf]
  n_true_hits: [3, .inf]
  track_particle_primary: True
  track_particle_pdgId: [not_in, [11, -11]]
  track_particle_radius: [0., 260.]
  track_particle_eta: [-4., 4.]

plots:
  tracking_efficiency:
    title: Track Reconstruction Efficiency
    variables : 
      pt :
        x_label: '$p_T [GeV]$'
        x_scale: 0.001
        x_lim: [1,20]
        y_lim: [0,1.3]
      # pt :
      #   x_label: '$p_T [MeV]$'
      #   x_scale: 1
      #   x_lim: [1,20000]
      #   y_lim: [0,1.3]
      eta:
        x_label: '$\eta$'
        x_lim: [-4,4]
        y_lim: [0,1.3]
    # evaluate_sharing_particles: True

matching_fraction: 0.5
matching_style: ATLAS
min_track_length: 5



