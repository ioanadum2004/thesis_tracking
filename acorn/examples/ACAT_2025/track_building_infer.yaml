# CommonFramework configuration
stage: track_building
model: CCandWalk
input_dir: MY_DATA_DIR/ignn2
stage_dir: MY_DATA_DIR/track

project: REL24 # Used in logging
accelerator: cpu
devices: 1
nodes: 1

# Dataset parameters
data_split: [0, 1000, 926] # Number of [training, validation, testing] examples

variable_with_prefix: True

score_cut_cc: 0.01
score_cut_walk: 
  min: 0.1
  add: 0.6
score_guided_walk: True
guidance_mode_walk: 2

max_workers: 1

log_level: INFO
