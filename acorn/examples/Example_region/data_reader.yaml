# CommonFramework configuration
stage: data_reading
model: AthenaRootReader
input_dir: INPUT_DIR/
input_sets:
    train: TRAIN_DIR/train_set_ttbar_uncorr.txt
    valid: VALID_DIR/valid_set_ttbar_uncorr.txt
    test: TEST_DIR/test_set_ttbar_uncorr.txt
stage_dir: DATA_READER_OUTPUT_DIR/
max_workers: 16

# Region Selection (to turn one on, set to true and set input region variables)

# doRegion Version
doRegion: False
region: REGION_NUM
region_lookup_path: REGION_LOOKUP_PATH
eta_region_low: 0.1 # If want to use then set value, else remove it
eta_region_high: 0.3 # If want to use then set value, else remove it
phi_region_low: 0.3 # If want to use then set value, else remove it
phi_region_high: 0.5 # If want to use then set value, else remove it

# doModuleRegion Version
doModuleRegion: False
region: REGION_NUM
module_region_lookup_path: MODULE_REGION_LOOKUP_PATH
eta_region_low: 0.1 # If want to use then set value, else remove it
eta_region_high: 0.3 # If want to use then set value, else remove it
phi_region_low: 0.3 # If want to use then set value, else remove it
phi_region_high: 0.5 # If want to use then set value, else remove it

# Feature Configurations
feature_sets:
    hit_features: [hit_id, hit_x, hit_y, hit_z, hit_r, hit_phi, hit_eta, hit_region, hit_module_id,
                   hit_cluster_x_1, hit_cluster_y_1, hit_cluster_z_1, hit_cluster_x_2, hit_cluster_y_2, hit_cluster_z_2,
                   hit_cluster_r_1, hit_cluster_phi_1, hit_cluster_eta_1, hit_cluster_r_2, hit_cluster_phi_2, hit_cluster_eta_2,
                   hit_norm_x_1, hit_norm_y_1, hit_norm_x_2, hit_norm_y_2,
                   hit_norm_z_1, hit_eta_angle_1, hit_phi_angle_1, hit_eta_angle_2, hit_phi_angle_2, hit_norm_z_2]

    track_features: [track_particle_id, track_particle_pt, track_particle_radius, track_particle_primary, track_particle_nhits, track_particle_pdgId, track_particle_eta, track_redundant_split_edges]

region_labels:
    1: {hardware: PIXEL, barrel_endcap: -2}
    2: {hardware: STRIP, barrel_endcap: -2}
    3: {hardware: PIXEL, barrel_endcap: 0}
    4: {hardware: STRIP, barrel_endcap: 0}
    5: {hardware: PIXEL, barrel_endcap: 2}
    6: {hardware: STRIP, barrel_endcap: 2}

log_level: INFO
