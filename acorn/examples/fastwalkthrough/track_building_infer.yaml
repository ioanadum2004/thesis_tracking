# CommonFramework configuration
stage: track_building
model: FastWalkthrough
input_dir: INPUT_DIR_PATH
stage_dir: STAGE_DIR_PATH

project: REL24 # Used in logging
accelerator: cpu
devices: 1
nodes: 1

# Dataset parameters
data_split: [0, 1, 0] # Number of [training, validation, testing] examples

variable_with_prefix: True

score_cut_cc: 0.01
score_cut_walk: 
  min: 0.1
  add: 0.6
score_guided_walk: True
guidance_mode_walk: 2

max_workers: 1

log_level: INFO
