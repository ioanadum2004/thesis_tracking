# ============================================================================
# EVENT CONFIGURATION
# ============================================================================
num_events: 100
particles_per_vertex: 20  # Particles generated at each collision vertex
multiplicity: 1           # Number of collision vertices per event (pileup)
random_seed: 42           

# ============================================================================
# PARTICLE GUN CONFIGURATION
# ============================================================================
particle_gun:
  particle_type: "muon"
  randomize_charge: true
  
  momentum:
    min: 0.1
    max: 0.5
    transverse: true
  
  eta:
    min: -0.14
    max: 0.14
    uniform: true
  
  phi:
    min: 0.0
    max: 360.0
  

# ============================================================================
# DETECTOR & FIELD CONFIGURATION
# ============================================================================
detector:
  type: "GenericDetector"
  
magnetic_field:
  strength: 2.0

# ============================================================================
# SIMULATION CONFIGURATION
# ============================================================================
simulation:
  enable_interactions: true
  num_threads: -1
  log_level: "INFO"
  loop_fraction: 1
  max_steps: 10000
  p_min: 0.01  # Minimum momentum threshold in GeV (must be low for 0.1-0.5 GeV particles)

# ============================================================================
# DIGITIZATION CONFIGURATION
# ============================================================================
digitization:
  config_file: "Examples/Configs/generic-digi-smearing-config.json"

# ============================================================================
# OUTPUT CONFIGURATION
# ============================================================================
output:
  base_dir: "./data"
  write_particles_initial: true
  write_geometry: true
