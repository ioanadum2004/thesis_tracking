# ============================================================================
# EVENT CONFIGURATION
# ============================================================================
num_events: 1000
particles_per_event: 20
random_seed: 42           

# ============================================================================
# PARTICLE GUN CONFIGURATION
# ============================================================================
particle_gun:
  particle_type: "muon"
  randomize_charge: true
  
  momentum:
    min: 1.0
    max: 10.0
    transverse: true
  
  eta:
    min: -2.5
    max: 2.5
    uniform: true
  
  phi:
    min: 0.0
    max: 360.0
  

# ============================================================================
# DETECTOR & FIELD CONFIGURATION
# ============================================================================
detector:
  type: "GenericDetector"
  
magnetic_field:
  strength: 2.0

# ============================================================================
# SIMULATION CONFIGURATION
# ============================================================================
simulation:
  enable_interactions: true
  num_threads: -1
  log_level: "INFO"
  loop_fraction: 0.5
  max_steps: 10000

# ============================================================================
# DIGITIZATION CONFIGURATION
# ============================================================================
digitization:
  config_file: "Examples/Configs/generic-digi-smearing-config.json"

# ============================================================================
# OUTPUT CONFIGURATION
# ============================================================================
output:
  base_dir: "./data"
  write_particles_initial: true
  write_geometry: true
