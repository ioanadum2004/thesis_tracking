# ============================================================================
# ACTS DATA READER CONFIGURATION
# ============================================================================
# Converts ACTS CSV files to PyG graph format for metric learning training
# This creates feature_store with graphs containing (r,phi,z) and particle_id
# ============================================================================

stage: data_reading
model: ActsReader

# Input/Output
input_dir: data/csv/                        # ACTS CSV files
stage_dir: data/feature_store/              # Output PyG graphs

# Data split [train, val, test]
data_split: [9000, 500, 500]
# Which datasets to process
input_sets: [trainset, valset, testset]
# ACTS-specific settings
simhit_stem: hits                           # Use 'hits' for truth hits
use_truth_hits: true                        # Use true hit positions (not measurements)
detector_path: data/csv/detectors.csv       # Detector geometry

# Features to extract
feature_sets:
  hit_features:
    - hit_id
    - hit_x
    - hit_y  
    - hit_z
    - hit_r
    - hit_phi
    - hit_eta
    - hit_particle_id
    - hit_region
  track_features:
    - track_particle_id
    - track_particle_pt
    - track_particle_radius
    - track_particle_nhits
    - track_particle_eta

# Region labels (assign hits to detector regions)
region_labels:
  1: {volume_id: [7, 9]}    # Pixel endcap
  2: {volume_id: 8}         # Pixel barrel
  3: {volume_id: [12, 14]}  # ShortStrip endcap
  4: {volume_id: 13}        # ShortStrip barrel
  5: {volume_id: [16, 18]}  # LongStrip endcap
  6: {volume_id: 17}        # LongStrip barrel

# Processing
max_workers: 16                             # 1 = disable multiprocessing (NumPy 2.x compatibility issue)
skip_csv_conversion: false                  # CSV already created, skip to PyG conversion
skip_pyg_conversion: false                  # We want to create PyG
variable_with_prefix: true                  # Keep hit_ prefix

# Logging
log_level: INFO
