# Paths (absolute)
input_dir: /data/alice/bkuipers/low_pt_gnn_pipeline/data/graph_constructed_latent  # Input graphs (from graph construction stage)
stage_dir: /data/alice/bkuipers/low_pt_gnn_pipeline/data/gnn_stage  # Output directory (graphs with edge_scores will be saved here)

# Dataset parameters
data_split: [0, 900, 900]  # [training, validation, testing] - infer on 100 test events

# Inference options
accelerator: cpu # cpu vs cuda
devices: 1
nodes: 1
num_workers: [8, 8, 8]  # Workers for [train, val, test] dataloaders during inference


# Model parameters (should match training config)
undirected: True
undirected_message_passing: True
node_features: [hit_r, hit_phi, hit_z]
node_scales: [1000, 3.14, 500]
# node_features: [hit_r, hit_phi, hit_z, hit_t]
# node_scales: [1000, 3.14, 500, 2000]

variable_with_prefix: true  # Keep edge_scores (don't rename to scores)
