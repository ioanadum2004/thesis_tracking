checkpoint: latentmodel_val_loss=0.0048.ckpt


k_max: 15  # Maximum number of neighbors per hit in latent space (KNN)


device: "cuda"  # Device to run inference on (cuda/cpu)

input_dir: data/feature_store/  # Input graphs (from ActsReader)
output_dir: data/graph_constructed_latent/  # Output graphs with learned edges

# Datasets to process
datasets: [trainset, valset, testset]

# ============================================================================
# ADVANCED OPTIONS
# ============================================================================
store_embeddings: true  # Store learned embeddings on graph objects for analysis
batch_size: 1  # Process one event at a time (graphs have variable sizes)
