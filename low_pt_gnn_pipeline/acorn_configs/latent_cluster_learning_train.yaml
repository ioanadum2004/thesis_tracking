# Metric Learning Training Configuration
# Trains a model to map hit features to a latent space where hits from the same 
# particle are close together. This learned embedding can then be used to build
# graphs more intelligently than simple radius + KNN.

stage: graph_construction
model: MetricLearning

# Data directories
input_dir: data/feature_store/  # PyG graphs from ActsReader (has r, phi, z, particle_id)
stage_dir: data/metric_learning/  # Output directory for trained model
project: Low_pt_latent_map_MLP  # W&B project name
accelerator: gpu
devices: 1
nodes: 1
logger: false
use_wandb: true  # Enable W&B tracking
wandb_entity: bart_kuipers-nikhef  
wandb_log_every_n_batches: 500  # Log every N batches to W&B

# Dataset split
data_split: [9000, 500, 500]  # [training, validation, testing]

# Edge weighting for training
# Simplified weighting - only uses edge truth (y) which is always available
weighting:
  - weight: 1.0
    conditions: 
      edge_y: False  
  - weight: 2.0           #note KLook after latent map what the data distrivution tru,false is....
    conditions:
      edge_y: True  



# Model architecture
undirected: True  
train_undirected: True
node_features: [hit_r, hit_phi, hit_z]  # ActsReader adds 'hit_' prefix
node_scales: [1000, 3.14, 1000]  
emb_hidden:   #512    
nb_layer: 5  # depth        eg 3 -> emb_hoidden -> emb_hidden -> emb_dim...x(nb_layer times)--> emb_dim
emb_dim: 8  # Final latent dimension 
activation: Tanh 

# Training sampling parameters
randomisation: 1  # Add random negative pairs (number = randomisation * points_per_batch)
points_per_batch: 5000
r_train: 0.15  
knn: 50  
knn_val: 100  # Max neighbors during validation (larger for better edge building)

# Optimization parameters
warmup: 1  
margin: 0.1  # Margin for contrastive loss
lr: 0.001  
scheduler: ReduceLROnPlateau  # Decrease LR only when validation metric doesn't improve
factor: 0.5 # LR decay factor (multiply LR by this when reducing)
patience: 1  # Number of epochs with no improvement before reducing LR
max_epochs: 50  
early_stopping_patience: 10 
check_val_every_n_epoch: 1


# Monitoring
metric_to_monitor: val_loss  # Monitor validation loss for checkpointing and LR scheduling
metric_mode: min  # Lower loss is better
num_workers: [16, 16, 0]  # Parallel data loading

# GPU optimizations
precision: 16-mixed  # Mixed precision training for 2x speedup

# Checkpointing 
checkpoint_filename: "latentmodel_val_loss_{val_loss:.4f}"  # Filename template with validation loss
save_top_k: 1  # Only save the single best model
save_last: false  
