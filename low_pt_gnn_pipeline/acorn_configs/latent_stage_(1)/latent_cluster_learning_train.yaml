# Metric Learning Training Configuration
# Trains a model to map hit features to a latent space where hits from the same 

stage: graph_construction
model: MetricLearning

# Data directories
input_dir: data/feature_store  # PyG graphs from ActsReader (has r, phi, z, particle_id)
stage_dir: data/metric_learning  # Output directory for trained model
project: Low_pt_latent_map_MLP_segmented_100_mixed # W&B project name
accelerator: gpu
devices: 1
nodes: 1
logger: false
use_wandb: true  # Enable W&B tracking
wandb_entity: bart_kuipers-nikhef  
wandb_log_every_n_batches: 500  # Log every N batches to W&B

# Dataset split
data_split: [20000, 900, 50]  # [training, validation, testing]

# Edge weighting for training
weighting:
  - weight: 1.0
    conditions:
      edge_y: False
  - weight: 1.0
    conditions:
      edge_y: True  



# Model architecture
undirected: True  
train_undirected: True
node_features: [hit_r, hit_phi, hit_z]  
node_scales: [1000, 3.14, 500]  
emb_hidden: 128  #512. #128    
nb_layer: 6  # depth        eg 3 -> emb_hoidden -> emb_hidden -> emb_dim...x(nb_layer times)--> emb_dim
emb_dim: 8  # Final latent dimension 
activation: Tanh 

# Training sampling parameters
randomisation: 1  # Add random negative pairs (number = randomisation * points_per_batch)
points_per_batch: 5000
r_train: 0.15      #for hard negative mining
knn: 50      # training 
knn_val: 50  # during validation 

# Optimization parameters
warmup: 1
margin: 0.15  # Hinge loss margin
lr: 0.001 
scheduler: ReduceLROnPlateau  # Decrease LR only when validation metric doesn't improve
factor: 0.5 # LR decay factor (multiply LR by this when reducing)
patience: 1  # Number of epochs with no improvement before reducing LR
max_epochs: 100
early_stopping_patience: 5
check_val_every_n_epoch: 1           
val_check_interval: 0.2  # Check validation every 10% of epoch for large data.

# Monitoring
# NOTE: With knn_val=100, f1 will be low (~0.01-0.05) due to many false edges
# This is expected - graph construction prioritizes high recall (efficiency)
# Purity can be improved later by edge filter + GNN
# Options:
#   - signal_eff: Efficiency = Recall = TP/(TP+FN) - finding all true edges (RECOMMENDED)
#   - signal_pur: Purity = Precision = TP/(TP+FP) - predictions are correct (less important here)
#   - f1: Harmonic mean of efficiency and purity (examples use this, but will be low with high knn_val)
#   - val_loss: Training loss (less interpretable)
metric_to_monitor: f1  # F1 score on validation set (harmonic mean of efficiency and purity)
metric_mode: max  # Higher F1 score is better (balance between efficiency and purity)
num_workers: [8, 8, 0]  # Parallel data loading (reduced for CPU training)

# GPU optimizations
precision: 16-mixed  # Mixed precision training for 2x speedup

# Checkpointing 
checkpoint_filename: "latentmodel_{f1:.4f}"  # Filename template with validation F1 score
save_top_k: 1  # Only save the single best model
save_last: false  
