# Combined Track Building and Evaluation Configuration
# Used by track_build_and_evaluate.py to build tracks, evaluate, and plot metrics

# CommonFramework configuration
stage: track_building
model: ConnectedComponents  # Options: ConnectedComponents, Walkthrough, CCandWalk, etc.

# Dataset parameters
data_split: [9000, 500, 500]  # Number of [training, validation, testing] examples
                              # Should match your data split from previous stages

# ============================================================================
# TRACK BUILDING PARAMETERS
# ============================================================================

# Input: graphs with edge_scores from edge classifier inference
input_dir: data/gnn_stage  # Should contain graphs with edge_scores from infer_gnn.py
stage_dir: data/track_building  # Output directory for built tracks

# Track building parameters
score_cut: 0.5  # Threshold for edge scores (edges with score > score_cut are kept)
                # Adjust based on your edge classifier performance

# Output options
save_tracks: true  # Save tracks as CSV/TXT files
save_graph: true   # Save graphs with track labels
save_tracks_as_csv: false  # If true, save as CSV; if false, save as TXT
athena_csv_format: false  # Use Athena-compatible CSV format

# Performance options
max_workers: 1  # Number of parallel workers (1 = sequential processing)

# Optional: Use truth edges instead of scored edges (for debugging)
# on_truth_particle_edges: false
# on_true_graph_edges: false

# ============================================================================
# EVALUATION PARAMETERS
# ============================================================================

# Evaluation parameters
matching_fraction: 0.5  # Threshold for matching (same as ACTS default)
matching_style: ATLAS    # Options: ATLAS, one_way, two_way
min_track_length: 1      # Minimum number of hits per track

# Particle selection (fiducial cuts)
target_tracks:
    pt: [0.1, .inf]      # pT range in GeV (adjust based on your data)
    nhits: [3, .inf]     # Minimum number of hits
    # primary: True       # Uncomment if you want only primary particles
    # pdgId: [not_in, [11, -11]]  # Exclude electrons if needed
    # eta_particle: [-4., 4.]     # Eta range

# Plot configuration
plots:
  tracking_efficiency:
    title: Track Reconstruction Efficiency
    variables:
      pt:
        x_label: '$p_T$ [GeV]'
        x_lim: [0.05, 1.0]  # pT range for plotting (data is 0.1-0.5 GeV)
        y_lim: [0, 1.1]
      eta:
        x_label: '$\eta$'
        x_lim: [-4, 4]  # Eta range for plotting
        y_lim: [0, 1.1]

# Output options
saveMatchingDF: true  # Save detailed matching DataFrame to CSV
