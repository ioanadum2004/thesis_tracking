# Track Building Configuration
# This stage takes graphs with edge_scores and builds candidate tracks

# CommonFramework configuration
stage: track_building
model: ConnectedComponents  # Options: ConnectedComponents, Walkthrough, CCandWalk, etc.

# Input: graphs with edge_scores from edge classifier inference
# Paths are relative to low_pt_gnn_pipeline directory
input_dir: data/gnn_stage  # Should contain graphs with edge_scores from infer_gnn.py
stage_dir: data/track_building  # Output directory for tracks

# Dataset parameters
data_split: [90, 50, 50]  # Number of [training, validation, testing] examples
                              # Should match your data split from previous stages

# Track building parameters
score_cut: 0.5  # Threshold for edge scores (edges with score > score_cut are kept)
                # Adjust based on your edge classifier performance

# Output options
save_tracks: true  # Save tracks as CSV/TXT files
save_graph: true   # Save graphs with track labels
save_tracks_as_csv: false  # If true, save as CSV; if false, save as TXT
athena_csv_format: false  # Use Athena-compatible CSV format

# Performance options
max_workers: 1  # Number of parallel workers (1 = sequential processing)

# Optional: Use truth edges instead of scored edges (for debugging)
# on_truth_particle_edges: false
# on_true_graph_edges: false
