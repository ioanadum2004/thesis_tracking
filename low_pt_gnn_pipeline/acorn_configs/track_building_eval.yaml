# Track Building Evaluation Configuration
# This config is used to evaluate track building performance

# CommonFramework configuration
stage: track_building
model: ConnectedComponents  # Should match the model used in track_building.yaml

# Input: graphs with track labels from track building stage
# Paths are relative to low_pt_gnn_pipeline directory
input_dir: data/track_building  # Should contain graphs with hit_track_labels
stage_dir: data/track_evaluation  # Output directory for evaluation results

# Dataset parameters
data_split: [9000, 500, 500]  # Number of [training, validation, testing] examples
                              # Should match your data split from previous stages

# Evaluation parameters
matching_fraction: 0.5  # Threshold for matching (same as ACTS default)
matching_style: ATLAS    # Options: ATLAS, one_way, two_way
min_track_length: 4      # Minimum number of hits per track

# Particle selection (fiducial cuts)
target_tracks:
    pt: [0.1, .inf]      # pT range in GeV (adjust based on your data)
    nhits: [4, .inf]     # Minimum number of hits
    # eta_particle: [-4., 4.]     # Eta range

# Plot configuration (for future plotting script)
plots:
  tracking_efficiency:
    title: Track Reconstruction Efficiency
    variables:
      pt:
        x_label: '$p_T$ [GeV]'
        x_lim: [0.05, 1.0]  # pT range for plotting (data is 0.1-0.5 GeV)
        y_lim: [0, 1.1]
      eta:
        x_label: '$\eta$'
        x_lim: [-4, 4]  # Eta range for plotting
        y_lim: [0, 1.1]

# Output options
saveMatchingDF: true  # Save detailed matching DataFrame to CSV
