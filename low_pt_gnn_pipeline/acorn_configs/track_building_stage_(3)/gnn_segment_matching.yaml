# GNN Segment Matching — Inference Configuration
# Used by GNN_segment_matching_track_builder.py

# Dataset parameters  [n_trainset, n_valset, n_testset]
data_split: [0, 0, 900]

# Input/output
input_dir: data/gnn_stage
stage_dir: data/track_building

# ============================================================================
# SEGMENT EXTRACTION
# ============================================================================

use_gt_segments: false  # true = use hit_segment_id, false = use CC clusters
score_cut: 0.85          # Edge score threshold for CC clustering

# ============================================================================
# GNN SEGMENT EMBEDDER
# ============================================================================

gnn:
  model_path: data/track_building/mini_GNN_checkpoints/mini_gnn_segment_embedder_val_loss=1.2621.pt


#/data/alice/bkuipers/low_pt_gnn_pipeline/data/track_building/mini_GNN_checkpoints/mini_gnn_segment_embedder_val_loss=1.3680.pt
  #data/track_building/mini_GNN_checkpoints/mini_gnn_segment_embedder_val_loss=2.6758.pt # update after training


  # Matching thresholds
  cos_sim_threshold: 0.65
  outer_r_threshold: 1000.0  # mm 

# ============================================================================
# EVALUATION PARAMETERS
# ============================================================================

matching_fraction: 0.7
matching_style: two_way
min_track_length: 5 

target_tracks:
    pt: [0.1, .inf]
    nhits: [7, .inf]           #reconstructable

# Plot configuration
plots:
  tracking_efficiency:
    title: Track Reconstruction Efficiency (GNN Segment Matching)
    font_sizes:
      axis_label: 18
      tick_label: 14
      legend: 14
      title: 18
    variables:
      pt:
        x_label: '$p_T$ [GeV]'
        x_lim: [0.1, 0.5]
        y_lim: [0.0, 1.05]
        n_bins: 30
      eta:
        x_label: '$\eta$'
        x_lim: [-0.2, 0.2]
        y_lim: [0, 1.1]
        n_bins: 30

# Variable prefix handling
variable_with_prefix: true
