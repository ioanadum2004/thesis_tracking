# Mini-GNN Segment Embedder — Training Configuration
# Used by train_mini_GNN_to_match.py


# ============================================================================
# DATA
# ============================================================================

# Number of events to use from each split: [n_trainset, n_valset, n_testset]
data_split: [30000, 900, 0]

# Input directory containing GNN-inferred graphs (used by mini_gnn_data_mining.py)
input_dir: data/gnn_stage

# Precomputed segment data directory (output of mini_gnn_data_mining.py,
# input to train_mini_GNN_to_match.py)
precomputed_dir: data/track_building/mini_gnn_segments


# MINI-GNN ARCHITECTURE


gnn:
  hidden_dim: 128             # Width of each SAGEConv layer and projection MLP
  emb_dim: 32                # Dimension of the final L2-normalized embedding vector
  n_layers: 4                # Number of SAGEConv message-passing layers
  dropout: 0.001
  proj_dim: 64              # Width of projection head hidden layers (default: hidden_dim)
  proj_layers: 2            # Number of hidden layers in projection head (default: 1) 
  node_scales: [1000, 1000, 500, 1000]  # Normalization scales for [x, y, z, r]

# 
# SUPCON LOSS

temperature: 0.1

# TRAINING HYPERPARAMETERS

batch_events: 16           # Number of events batched per optimizer step (GPU utilization)

lr: 0.001
max_epochs: 150
patience: 10              # Early stopping
scheduler_patience: 2      # ReduceLROnPlateau
scheduler_factor: 0.5      # ReduceLROnPlateau
val_check_interval: 0.2    # Validate every fraction of epoch (0.5 = twice per epoch, 1.0 = once)

# OUTPUT

# Directory to save best model checkpoint (relative to pipeline root)
model_save_dir: data/track_building/mini_GNN_checkpoints
