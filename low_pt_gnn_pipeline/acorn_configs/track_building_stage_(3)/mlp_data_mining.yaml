# MLP Segment Pair Data Mining Configuration
# Used by mlp_data_mining.py


data_split: [30000, 900, 900]


input_dir: data/gnn_stage
output_dir: data/track_building/MLP_segments

# ============================================================================
# SEGMENT EXTRACTION
# ============================================================================

score_cut: 0.85          # Edge score threshold for CC clustering
B_field: 2.0             
outlier_rejection: true  # Iterative outlier rejection in Kasa circle fit

# ============================================================================
# PAIR MINING
# ============================================================================

neg_ratio: 5             # Max negative pairs per positive pair (per event)

# ============================================================================
# FEATURE NORMALIZATION SCALES
# ============================================================================
# Each feature is divided by its scale before storage.
# Must be identical to the scales used during training and inference.

feature_scales:
  xc:           500.0   
  yc:           500.0    # circle center y (mm)
  R:            500.0    # circle radius (mm)
  pitch:        1.0      # dz/ds (already ~[-0.5, 0.5])
  nhits:        20.0     # number of hits per segment
  inner_r:      1000.0   # innermost hit radius (mm)
  outer_r:      1000.0   # outermost hit radius (mm)
  residual_rms: 10.0     # Kasa circle fit residual RMS (mm)
  center_dist:  1000.0   # pairwise: distance between circle centers (mm)
  pitch_diff:   1.0      # pairwise: |pitch_a - pitch_b|
