# MLP Segment Matcher — Inference Configuration
# Used by MLP_segment_matching_track_builder.py

# Dataset parameters  [n_trainset, n_valset, n_testset]
data_split: [0, 0,900]

# Input/output
input_dir: data/gnn_stage
stage_dir: data/track_building

# ============================================================================
# SEGMENT EXTRACTION
# ============================================================================

use_gt_segments: false  # true = use hit_segment_id, false = use CC clusters
score_cut: 0.85          # Edge score threshold for CC clustering

# ============================================================================
# HELIX FITTING
# ============================================================================

B_field: 2.0            # Magnetic field strength (Tesla)
outlier_rejection: true # Iterative outlier rejection in circle fit

# ============================================================================
# MLP MODEL
# ============================================================================

mlp:
  # Path to trained model checkpoint (relative to pipeline root).

  model_path: data/track_building/MLP_checkpoints/mlp_segment_matcher_val_loss-0.068066.pt
  
  
  # Matching thresholds



  mlp_score_threshold: 0.5   # Minimum MLP score for a candidate pair
  outer_r_threshold: 1000.0  # mm — segments with outer_r >= this are complete tracks

# ============================================================================
# EVALUATION PARAMETERS
# ============================================================================

matching_fraction: 0.7
matching_style: two_way
min_track_length: 3

target_tracks:
    pt: [0.1, .inf]
    nhits: [4, .inf]

# Plot configuration
plots:
  tracking_efficiency:
    title: Track Reconstruction Efficiency (MLP Segment Matching)
    font_sizes:
      axis_label: 18
      tick_label: 14
      legend: 14
      title: 18
    variables:
      pt:
        x_label: '$p_T$ [GeV]'
        x_lim: [0.1, 0.5]
        y_lim: [0.0, 1.05]
        n_bins: 30
      eta:
        x_label: '$\eta$'
        x_lim: [-0.2, 0.2]
        y_lim: [0, 1.1]
        n_bins: 30

# Variable prefix handling
variable_with_prefix: true
