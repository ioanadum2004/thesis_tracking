# MLP Segment Matcher — Training Configuration
# Used by train_mlp_segment_matcher.py
# Run mlp_data_mining.py first to produce the mined pair tensors.

# ============================================================================
# DATA
# ============================================================================


mined_data_dir: data/track_building/MLP_segments
data_split: [30000, 900] #train, val 

# ============================================================================
# MLP ARCHITECTURE
# ============================================================================

mlp:
  hidden_dims: [32,64, 64, 32]
  dropout: 0.1

# ============================================================================
# TRAINING HYPERPARAMETERS
# ============================================================================

lr: 0.001
max_epochs: 100
patience: 10
batch_size: 512

# ============================================================================
# OUTPUT
# ============================================================================

# Base path for saved model — val_loss is appended to the stem at runtime.
# e.g. mlp_segment_matcher_val_loss-0.123456.pt
model_save_path: data/track_building/MLP_checkpoints/mlp_segment_matcher.pt