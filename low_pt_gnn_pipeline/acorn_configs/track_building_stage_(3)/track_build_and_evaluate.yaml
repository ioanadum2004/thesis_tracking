# Combined Track Building and Evaluation Configuration
# Used by track_build_and_evaluate.py to build tracks, evaluate, and plot metrics

# CommonFramework configuration
stage: track_building
model: ConnectedComponents  # Options: ConnectedComponents, Walkthrough, CCandWalk, etc.

# Dataset parameters
data_split: [0, 1000, 0] 


# ============================================================================
# TRACK BUILDING PARAMETERS
# ============================================================================

input_dir: data/gnn_stage  
stage_dir: data/track_building  


#ConnectedComponents specific parameters      
score_cut: 0.8  # Threshold for edge scores (edges with score > score_cut are kept)


# FastWalkthrough specific parameters                
# score_cut_cc: 0.8  # Threshold for connected components stage
# score_cut_walk:      # Thresholds for walkthrough stage
#   min: 0.1           # Minimum score to start a track
#   add: 0.6           # Minimum score to add a hit to existing track


save_tracks: true  
save_graph: true   
save_tracks_as_csv: false 
athena_csv_format: false  
max_workers: 1  

# ============================================================================
# EVALUATION PARAMETERS
# ============================================================================

matching_fraction: 0.7
matching_style: two_way    #one_way, two_way. (successfully reconstruct = both completeness and purity)
min_track_length: 4      # Minimum number of hits per track

# Particle selection (fiducial cuts)
target_tracks:
    pt: [0.1, .inf]      # pT range in GeV 
    nhits: [4, .inf]     
    # primary: True       # Uncomment if you want only primary particles
    # pdgId: [not_in, [11, -11]]  # Exclude electrons if needed
    # eta_particle: [-4., 4.]     # Eta range

# Plot configuration
plots:
  tracking_efficiency:
    title: Track Reconstruction Efficiency
    font_sizes:
      axis_label: 18    # Font size for x and y axis labels
      tick_label: 14    # Font size for axis tick numbers
      legend: 14        # Font size for legend text
      title: 18         # Font size for plot title
    variables:
      pt:
        x_label: '$p_T$ [GeV]'
        x_lim: [0.1, 0.5]  # pT range for plotting (data is 0.1-0.5 GeV)
        y_lim: [0.8, 1.05]
        n_bins: 30  # Number of bins (optional, default is 20)
      eta:
        x_label: '$\eta$'
        x_lim: [-0.2, 0.2]  # Eta range for plotting (narrow for low-pT particle gun)
        y_lim: [0, 1.1]
        n_bins: 30  # Number of bins (optional, default is 20)

# Output options
saveMatchingDF: false  
